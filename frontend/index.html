<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>网上购物商城</title>
    <style>
        body {font-family:Arial;margin:30px;}
        .ai-box {background:#e8f4ff;padding:20px;border-radius:8px;margin-bottom:25px;}
        .goods-item {border:1px solid #ddd;padding:12px;margin:8px 0;border-radius:6px;display:flex;justify-content:space-between;align-items:flex-start;}
        .goods-info{flex:1;}
        .btn-row{margin:12px 0;}
        input {padding:6px;width:320px;margin-right:10px;margin:4px 0;}
        button {padding:7px 14px;color:white;border:none;border-radius:4px;cursor:pointer;margin:4px;font-size:14px;}
        .btn-ai{background:#007bff;}
        .btn-random{background:#28a745;}
        .btn-cart{background:#ff7f24;}
        .btn-order{background:#9332e6;}
        .btn-login{background:#17a2b8;}
        .btn-register{background:#6c757d;}
        .btn-del{background:#dc3545;padding:4px 8px;font-size:12px;}
        .close-btn{background:#666;}
        #aiResult{min-height:40px;line-height:1.6;}
        .mask{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:99;}
        .popup{position:absolute;top:10%;left:20%;width:60%;background:white;padding:25px;border-radius:8px;max-height:80vh;overflow-y:auto;}
        .popup h3{margin-top:0;display:flex;justify-content:space-between;}
        .cart-item,.order-item{border-bottom:1px solid #eee;padding:10px 0;}
        .top-bar{display:flex;gap:10px;align-items:center;margin-bottom:10px;}
        .user-info{color:#007bff;font-weight:bold;}
    </style>
</head>
<body>
    <div class="top-bar">
        <span id="userShow" class="user-info">未登录</span>
        <button class="btn-login" onclick="openLoginPopup()">登录</button>
        <button class="btn-register" onclick="openRegPopup()">注册</button>
        <button class="btn-cart" onclick="openCartPopup()">购物车</button>
        <button class="btn-order" onclick="openOrderPopup()">我的订单</button>
    </div>

    <h1>网上购物商城</h1>

    <div class="ai-box">
        <h3>AI智能导购（MCP Qwen3大模型，50件10分类商品）</h3>
        <div class="btn-row">
            <input id="askInput" placeholder="输入需求：送礼物、护肤、数码、家居等">
            <button class="btn-ai" onclick="sendAiAsk()">AI推荐</button>
            <button class="btn-random" onclick="refreshRandomGoods()">随机换一批</button>
        </div>
        <p id="aiResult"></p>
    </div>

    <div>
        <h3>商品展示（30秒自动随机刷新）</h3>
        <div id="goodsBox"></div>
    </div>

    <!-- 登录弹窗 -->
    <div class="mask" id="loginMask">
        <div class="popup">
            <h3>账号登录 <button class="close-btn" onclick="closeLoginPopup()">关闭</button></h3>
            <div>
                <div>用户名：<input type="text" id="loginUser"></div>
                <div>密码：<input type="password" id="loginPwd"></div>
                <button class="btn-login" onclick="doLogin()">确认登录</button>
                <p id="loginTip" style="color:red;"></p>
            </div>
        </div>
    </div>

    <!-- 注册弹窗 -->
    <div class="mask" id="regMask">
        <div class="popup">
            <h3>新用户注册 <button class="close-btn" onclick="closeRegPopup()">关闭</button></h3>
            <div>
                <div>用户名：<input type="text" id="regUser"></div>
                <div>密码：<input type="password" id="regPwd"></div>
                <div>邮箱（选填）：<input type="text" id="regEmail"></div>
                <button class="btn-register" onclick="doRegister()">完成注册</button>
                <p id="regTip" style="color:red;"></p>
            </div>
        </div>
    </div>

    <!-- 购物车弹窗 -->
    <div class="mask" id="cartMask">
        <div class="popup">
            <h3>我的购物车 <button class="close-btn" onclick="closeCartPopup()">关闭</button></h3>
            <div id="cartContent"></div>
            <div style="margin-top:15px;">
                <button class="btn-order" onclick="checkoutAll()">结算下单</button>
            </div>
        </div>
    </div>

    <!-- 订单弹窗 -->
    <div class="mask" id="orderMask">
        <div class="popup">
            <h3>我的订单 <button class="close-btn" onclick="closeOrderPopup()">关闭</button></h3>
            <div id="orderContent"></div>
        </div>
    </div>

    <script>
        let autoRefreshTimer;
        let loginUserId = null;
        let loginUserName = "";

        window.onload = function(){
            refreshRandomGoods();
            autoRefreshTimer = setInterval(refreshRandomGoods, 30000);
        }

        function renderGoods(list){
            let html = "";
            if(list.length === 0){
                html = "<div>无匹配商品</div>";
            }else{
                list.forEach(item=>{
                    html += `
                        <div class="goods-item">
                            <div class="goods-info">
                                <div><strong>商品：</strong>${item.goods_name}</div>
                                <div><strong>售价：</strong>¥${item.price}</div>
                                <div><strong>库存：</strong>${item.stock}件</div>
                                <div><strong>分类：</strong>${item.category}</div>
                                <div><strong>简介：</strong>${item.description}</div>
                            </div>
                            <button class="btn-cart" onclick="addCartCheckLogin(${item.goods_id})">加入购物车</button>
                        </div>
                    `
                })
            }
            document.getElementById("goodsBox").innerHTML = html;
        }

        async function refreshRandomGoods(){
            document.getElementById("goodsBox").innerHTML = "加载商品...";
            const res = await fetch("/api/goods/random", {cache:"no-cache"});
            const data = await res.json();
            renderGoods(data.goods_list);
        }

        async function loadSearchGoods(keyword){
            const res = await fetch(`/api/goods/search?keyword=${encodeURIComponent(keyword)}`, {cache:"no-cache"});
            const data = await res.json();
            renderGoods(data.goods_list);
        }

        async function sendAiAsk(){
            const text = document.getElementById("askInput").value.trim();
            if(!text) return;
            document.getElementById("aiResult").innerText = "AI分析中...";
            document.getElementById("goodsBox").innerHTML = "筛选商品...";
            const aiRes = await fetch(`/api/ai/recommend?prompt=${encodeURIComponent(text)}`,{cache:"no-cache"});
            const aiData = await aiRes.json();
            document.getElementById("aiResult").innerText = aiData["ai回复"];
            await loadSearchGoods(text);
        }

        // 登录注册
        function openLoginPopup(){
            document.getElementById("loginMask").style.display = "block";
            document.getElementById("loginTip").innerText = "";
        }
        function closeLoginPopup(){
            document.getElementById("loginMask").style.display = "none";
        }
        function openRegPopup(){
            document.getElementById("regMask").style.display = "block";
            document.getElementById("regTip").innerText = "";
        }
        function closeRegPopup(){
            document.getElementById("regMask").style.display = "none";
        }

        async function doLogin(){
            let u = document.getElementById("loginUser").value.trim();
            let p = document.getElementById("loginPwd").value.trim();
            if(!u||!p){
                document.getElementById("loginTip").innerText = "用户名密码不能为空";
                return;
            }
            const res = await fetch(`/api/user/login?username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`,{cache:"no-cache"});
            let ret = await res.json();
            if(ret.user_id){
                loginUserId = ret.user_id;
                loginUserName = ret.username;
                document.getElementById("userShow").innerText = "欢迎："+loginUserName;
                closeLoginPopup();
                alert("登录成功");
            }else{
                document.getElementById("loginTip").innerText = ret.msg;
            }
        }

        async function doRegister(){
            let u = document.getElementById("regUser").value.trim();
            let p = document.getElementById("regPwd").value.trim();
            let e = document.getElementById("regEmail").value.trim();
            if(!u||!p){
                document.getElementById("regTip").innerText = "用户名密码必填";
                return;
            }
            const res = await fetch(`/api/user/register?username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}&email=${encodeURIComponent(e)}`,{cache:"no-cache"});
            let ret = await res.json();
            if(ret.msg === "注册成功，请登录"){
                alert(ret.msg);
                closeRegPopup();
            }else{
                document.getElementById("regTip").innerText = ret.msg;
            }
        }

        function addCartCheckLogin(gid){
            if(!loginUserId){
                alert("请先登录账号");
                openLoginPopup();
                return;
            }
            addGoodsToCart(gid);
        }
        async function addGoodsToCart(gid){
            const res = await fetch(`/api/cart/add?user_id=${loginUserId}&goods_id=${gid}&buy_num=1`,{cache:"no-cache"});
            let ret = await res.json();
            alert(ret.msg);
        }

        // 购物车
        function openCartPopup(){
            if(!loginUserId){
                alert("请先登录");
                openLoginPopup();
                return;
            }
            document.getElementById("cartMask").style.display = "block";
            loadCartList();
        }
        function closeCartPopup(){
            document.getElementById("cartMask").style.display = "none";
        }
        async function loadCartList(){
            const res = await fetch(`/api/cart/list?user_id=${loginUserId}`,{cache:"no-cache"});
            let data = await res.json();
            let html = "";
            if(data.cart_list.length ===0){
                html = "<p>购物车空空如也，快去挑选商品吧</p>";
            }else{
                data.cart_list.forEach(item=>{
                    html += `
                    <div class="cart-item">
                        <div>${item.goods_name} ×${item.buy_num} 单价¥${item.price}</div>
                        <div>小计：¥${(item.buy_num * item.price).toFixed(2)}
                        <button class="btn-del" onclick="delCart(${item.cart_id})">删除</button>
                        </div>
                    </div>
                    `
                })
            }
            document.getElementById("cartContent").innerHTML = html;
        }
        async function delCart(cid){
            await fetch(`/api/cart/del?user_id=${loginUserId}&cart_id=${cid}`,{cache:"no-cache"});
            loadCartList();
        }

        // 结算：成功自动打开订单
        async function checkoutAll(){
            const res = await fetch(`/api/order/checkout?user_id=${loginUserId}`,{cache:"no-cache"});
            let ret = await res.json();
            alert(ret.msg + (ret.total_price ? " 实付¥"+ret.total_price : ""));
            loadCartList();
            closeCartPopup();
            openOrderPopup();
        }

        // 订单
        function openOrderPopup(){
            if(!loginUserId){
                alert("请先登录");
                openLoginPopup();
                return;
            }
            document.getElementById("orderMask").style.display = "block";
            loadOrderList();
        }
        function closeOrderPopup(){
            document.getElementById("orderMask").style.display = "none";
        }
        async function loadOrderList(){
            const res = await fetch(`/api/order/list?user_id=${loginUserId}`,{cache:"no-cache"});
            let data = await res.json();
            let html = "";
            if(data.order_list.length ===0){
                html = "<p>暂无任何订单</p>";
            }else{
                data.order_list.forEach(ord=>{
                    let itemStr = "";
                    ord.items.forEach(it=>{
                        itemStr += `${it.goods_name} ×${it.num} 单价¥${it.single_price}；`
                    })
                    let statusTxt = ord.status==0?"待发货":ord.status==1?"已发货":"已完成";
                    html += `
                    <div class="order-item">
                        <div><strong>订单号：</strong>${ord.order_id}</div>
                        <div><strong>下单时间：</strong>${ord.create_time}</div>
                        <div><strong>订单状态：</strong>${statusTxt}</div>
                        <div><strong>订单总额：</strong>¥${ord.total_amount}</div>
                        <div><strong>商品明细：</strong>${itemStr}</div>
                    </div>
                    `
                })
            }
            document.getElementById("orderContent").innerHTML = html;
        }
    </script>
</body>
</html>
